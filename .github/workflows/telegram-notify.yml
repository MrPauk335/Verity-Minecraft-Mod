name: Release Build & Notify

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-notify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Upload JAR to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "TG_BOT_TOKEN or TG_CHAT_ID not set, skipping"
            exit 0
          fi

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_BODY="${{ github.event.release.body }}"
          RELEASE_URL="${{ github.event.release.html_url }}"

          if [ -z "$RELEASE_NAME" ] || [ "$RELEASE_NAME" = "null" ]; then
            RELEASE_NAME="New version: $TAG_NAME"
          fi
          if [ -z "$RELEASE_BODY" ] || [ "$RELEASE_BODY" = "null" ]; then
            RELEASE_BODY="New version released. See on GitHub."
          fi
          if [ -z "$RELEASE_URL" ] || [ "$RELEASE_URL" = "null" ]; then
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"
          fi

          RELEASE_BODY=$(echo "$RELEASE_BODY" | head -c 3000)

          MESSAGE="🔔 *Verity Mod — New Release!*

          *${RELEASE_NAME}*

          ${RELEASE_BODY}

          📦 [Download](${RELEASE_URL})
          🏠 [GitHub](https://github.com/${{ github.repository }})"

          export MESSAGE
          python3 -c "
          import json, urllib.request, os
          data = json.dumps({
              'chat_id': os.environ['CHAT_ID'],
              'text': os.environ['MESSAGE'],
              'parse_mode': 'Markdown',
              'disable_web_page_preview': False
          }).encode()
          req = urllib.request.Request(
              'https://api.telegram.org/bot' + os.environ['BOT_TOKEN'] + '/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          print('Telegram notification sent!' if resp.status == 200 else 'Failed: ' + resp.read().decode())
          "
