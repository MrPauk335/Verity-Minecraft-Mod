name: Release Build & Notify

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-notify:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Upload JAR to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar

      - name: Send to Telegram
        if: github.event_name == 'release'
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          bot_token = os.environ.get('BOT_TOKEN', '')
          chat_id = os.environ.get('CHAT_ID', '')
          if not bot_token or not chat_id:
              print('TG_BOT_TOKEN or TG_CHAT_ID not set, skipping')
              exit(0)

          release_name = os.environ.get('RELEASE_NAME', '')
          release_body = os.environ.get('RELEASE_BODY', '')
          release_url = os.environ.get('RELEASE_URL', '')
          repo = os.environ.get('REPO', '')

          if not release_name or release_name == 'null':
              release_name = 'New version released'
          if not release_body or release_body == 'null':
              release_body = 'See on GitHub for details.'
          if not release_url or release_url == 'null':
              release_url = f'https://github.com/{repo}/releases'

          # Truncate body
          if len(release_body) > 3000:
              release_body = release_body[:3000]

          message = (
              f"\U0001F514 *Verity Mod \u2014 New Release!*\n\n"
              f"*{release_name}*\n\n"
              f"{release_body}\n\n"
              f"\U0001F4E6 [Download]({release_url})\n"
              f"\U0001F3E0 [GitHub](https://github.com/{repo})"
          )

          data = json.dumps({
              'chat_id': chat_id,
              'text': message,
              'parse_mode': 'Markdown',
              'disable_web_page_preview': False
          }).encode()

          req = urllib.request.Request(
              f'https://api.telegram.org/bot{bot_token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
          )

          try:
              resp = urllib.request.urlopen(req)
              print('Telegram notification sent!')
          except Exception as e:
              print(f'Failed: {e}')
              exit(1)
          PYEOF
